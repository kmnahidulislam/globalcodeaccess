kind = "web"
previewPath = "/"
title = "Global Code Access Foundation"
version = "1.0.0"
id = "artifacts/gcaf-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18545

[services.development]
run = "pnpm --filter @workspace/gcaf-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gcaf-website", "run", "build" ]
publicDir = "artifacts/gcaf-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18545"
BASE_PATH = "/"
